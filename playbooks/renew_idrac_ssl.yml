---
- name: Renew Dell iDRAC HTTPS certificate with AD CS
  hosts: idrac
  gather_facts: false
  connection: local

  vars:
    idrac_ip: "{{ ansible_host | default(inventory_hostname) }}"
    idrac_auth_user: "{{ idrac_user | default(lookup('ansible.builtin.env', 'IDRAC_USERNAME'), true) }}"
    idrac_auth_password: "{{ idrac_password | default(lookup('ansible.builtin.env', 'IDRAC_PASSWORD'), true) }}"
    idrac_cert_file_stem: "{{ inventory_hostname | regex_replace('[^A-Za-z0-9_.-]', '_') }}"
    certificate_work_dir: "{{ certificate_work_root | default(playbook_dir ~ '/../artifacts') }}/{{ idrac_cert_file_stem }}"
    idrac_cert_common_name_effective: "{{ idrac_cert_common_name | default(inventory_hostname) }}"
    idrac_cert_sans_effective: "{{ idrac_cert_subject_alt_name | default([idrac_cert_common_name_effective, idrac_ip]) | unique }}"
    adcs_web_base_url: "{{ adcs_web_enrollment_url | regex_replace('/+$', '') }}"
    adcs_web_csr_path: "{{ adcs_web_work_dir }}\\{{ idrac_cert_file_stem }}.csr"
    adcs_web_cert_path: "{{ adcs_web_work_dir }}\\{{ idrac_cert_file_stem }}.pem"
    signed_cert_local_path: "{{ certificate_work_dir }}/{{ idrac_cert_file_stem }}.pem"

  tasks:
    - name: Validate required iDRAC and AD CS inputs
      ansible.builtin.assert:
        that:
          - idrac_auth_user | length > 0
          - idrac_auth_password | length > 0
          - adcs_web_enrollment_url is defined
          - adcs_template is defined
          - adcs_web_enrollment_host is defined
          - adcs_web_work_dir is defined
          - idrac_cert_country_code is defined
          - idrac_cert_state_name is defined
          - idrac_cert_locality_name is defined
          - idrac_cert_organization_name is defined
          - idrac_cert_organization_unit is defined
        fail_msg: >-
          Define iDRAC credentials, AD CS enrollment settings, and CSR subject
          values. See inventory/group_vars/idrac.example.yml.
      no_log: true

    - name: Create local certificate work directory
      ansible.builtin.file:
        path: "{{ certificate_work_dir }}"
        state: directory
        mode: "0700"

    - name: Build CSR parameters
      ansible.builtin.set_fact:
        idrac_csr_params: >-
          {{
            {
              'common_name': idrac_cert_common_name_effective,
              'country_code': idrac_cert_country_code,
              'state_name': idrac_cert_state_name,
              'locality_name': idrac_cert_locality_name,
              'organization_name': idrac_cert_organization_name,
              'organization_unit': idrac_cert_organization_unit,
              'subject_alt_name': idrac_cert_sans_effective
            }
            | combine(
              (idrac_cert_email_address | default('') | length > 0)
              | ternary({'email_address': idrac_cert_email_address}, {})
            )
          }}

    - name: Generate HTTPS CSR on iDRAC
      dellemc.openmanage.idrac_certificates:
        idrac_ip: "{{ idrac_ip }}"
        idrac_port: "{{ idrac_port | default(443) }}"
        idrac_user: "{{ idrac_auth_user }}"
        idrac_password: "{{ idrac_auth_password }}"
        validate_certs: "{{ idrac_validate_certs | default(true) | bool }}"
        ca_path: "{{ idrac_ca_path | default(omit, true) }}"
        timeout: "{{ idrac_timeout | default(60) }}"
        command: generate_csr
        certificate_type: HTTPS
        certificate_path: "{{ certificate_work_dir }}"
        cert_params: "{{ idrac_csr_params }}"
      register: idrac_csr
      no_log: "{{ idrac_no_log | default(true) | bool }}"

    - name: Remember generated CSR path
      ansible.builtin.set_fact:
        csr_local_path: "{{ idrac_csr.certificate_path }}"

    - name: Create AD CS Web Enrollment work directory
      ansible.windows.win_file:
        path: "{{ adcs_web_work_dir }}"
        state: directory
      delegate_to: "{{ adcs_web_enrollment_host }}"

    - name: Remove stale AD CS Web Enrollment output
      ansible.windows.win_file:
        path: "{{ item }}"
        state: absent
      loop:
        - "{{ adcs_web_csr_path }}"
        - "{{ adcs_web_cert_path }}"
      delegate_to: "{{ adcs_web_enrollment_host }}"

    - name: Copy CSR to AD CS Web Enrollment client
      ansible.windows.win_copy:
        src: "{{ csr_local_path }}"
        dest: "{{ adcs_web_csr_path }}"
      delegate_to: "{{ adcs_web_enrollment_host }}"

    - name: Submit CSR to AD CS Web Enrollment with NTLM
      ansible.windows.win_shell: |
        $ErrorActionPreference = 'Stop'
        $ProgressPreference = 'SilentlyContinue'

        $baseUrl = '{{ adcs_web_base_url }}'
        $csrPath = '{{ adcs_web_csr_path }}'
        $certPath = '{{ adcs_web_cert_path }}'
        $template = '{{ adcs_template }}'
        $timeoutSec = {{ adcs_web_timeout | default(60) | int }}
        $validateCerts = [System.Convert]::ToBoolean('{{ adcs_web_validate_certs | default(true) | bool }}')
        $usernameBytes = [System.Convert]::FromBase64String('{{ adcs_web_username | default('', true) | b64encode }}')
        $passwordBytes = [System.Convert]::FromBase64String('{{ adcs_web_password | default('', true) | b64encode }}')
        $username = [System.Text.Encoding]::UTF8.GetString($usernameBytes)
        $password = [System.Text.Encoding]::UTF8.GetString($passwordBytes)

        if (-not $validateCerts) {
          [System.Net.ServicePointManager]::ServerCertificateValidationCallback = { $true }
        }
        [System.Net.ServicePointManager]::SecurityProtocol = [System.Net.SecurityProtocolType]::Tls12

        $session = New-Object Microsoft.PowerShell.Commands.WebRequestSession
        $commonParams = @{
          WebSession = $session
          TimeoutSec = $timeoutSec
          UseBasicParsing = $true
        }

        if ([string]::IsNullOrWhiteSpace($username) -or [string]::IsNullOrWhiteSpace($password)) {
          $commonParams.UseDefaultCredentials = $true
        } else {
          $securePassword = ConvertTo-SecureString -String $password -AsPlainText -Force
          $commonParams.Credential = New-Object System.Management.Automation.PSCredential($username, $securePassword)
        }

        Invoke-WebRequest @commonParams -Uri "$baseUrl/certrqxt.asp" -Method Get | Out-Null

        $csr = Get-Content -Path $csrPath -Raw
        $form = @{
          Mode = 'newreq'
          CertRequest = $csr
          CertAttrib = "CertificateTemplate:$template"
          TargetStoreFlags = '0'
          SaveCert = 'yes'
        }

        $submitResponse = Invoke-WebRequest @commonParams `
          -Uri "$baseUrl/certfnsh.asp" `
          -Method Post `
          -ContentType 'application/x-www-form-urlencoded' `
          -Body $form

        $submitHtml = [string]$submitResponse.Content
        if ($submitHtml -notmatch '[Rr]eqID=([0-9]+)' -or -not $submitHtml.ToLowerInvariant().Contains('certnew.cer')) {
          throw 'AD CS Web Enrollment did not return an issued certificate download link. The request may be pending, denied, or require CA manager approval.'
        }

        $requestId = $Matches[1]
        Invoke-WebRequest @commonParams `
          -Uri "$baseUrl/certnew.cer?ReqID=$requestId&Enc=b64" `
          -Method Get `
          -OutFile $certPath

        $certificate = Get-Content -Path $certPath -Raw
        if (-not $certificate.Contains('-----BEGIN CERTIFICATE-----') -or -not $certificate.Contains('-----END CERTIFICATE-----')) {
          throw "AD CS Web Enrollment did not return a PEM certificate for request $requestId."
        }

        [pscustomobject]@{
          RequestId = $requestId
          CertificatePath = $certPath
        } | ConvertTo-Json -Compress
      register: adcs_web_submit
      changed_when: true
      delegate_to: "{{ adcs_web_enrollment_host }}"
      no_log: "{{ adcs_web_no_log | default(true) | bool }}"

    - name: Remember AD CS request ID
      ansible.builtin.set_fact:
        adcs_request_id: "{{ (adcs_web_submit.stdout | from_json).RequestId }}"

    - name: Fetch signed certificate to controller
      ansible.builtin.fetch:
        src: "{{ adcs_web_cert_path }}"
        dest: "{{ signed_cert_local_path }}"
        flat: true
      delegate_to: "{{ adcs_web_enrollment_host }}"

    - name: Verify downloaded certificate is PEM encoded
      ansible.builtin.assert:
        that:
          - "'-----BEGIN CERTIFICATE-----' in lookup('ansible.builtin.file', signed_cert_local_path)"
          - "'-----END CERTIFICATE-----' in lookup('ansible.builtin.file', signed_cert_local_path)"
        fail_msg: >-
          AD CS Web Enrollment did not return a PEM certificate for request
          {{ adcs_request_id }}. Check the CA request status and Web Enrollment
          authentication settings.

    - name: Install signed HTTPS certificate on iDRAC
      dellemc.openmanage.idrac_certificates:
        idrac_ip: "{{ idrac_ip }}"
        idrac_port: "{{ idrac_port | default(443) }}"
        idrac_user: "{{ idrac_auth_user }}"
        idrac_password: "{{ idrac_auth_password }}"
        validate_certs: "{{ idrac_validate_certs | default(true) | bool }}"
        ca_path: "{{ idrac_ca_path | default(omit, true) }}"
        timeout: "{{ idrac_timeout | default(60) }}"
        command: import
        certificate_type: HTTPS
        certificate_path: "{{ signed_cert_local_path }}"
        reset: "{{ idrac_reset_after_import | default(true) | bool }}"
        wait: "{{ idrac_reset_wait | default(900) }}"
      no_log: "{{ idrac_no_log | default(true) | bool }}"

    - name: Show renewal result
      ansible.builtin.debug:
        msg:
          - "Installed signed HTTPS certificate on {{ inventory_hostname }}."
          - "CSR: {{ csr_local_path }}"
          - "Certificate: {{ signed_cert_local_path }}"
